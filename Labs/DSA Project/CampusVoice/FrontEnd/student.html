<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusVoice - Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CampusVoice</h1>
        <p>Student Portal - Submit Complaints</p>
    </header>

    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="btn btn-outline">&larr; Back to Menu</a>
        </div>

        <div class="grid-2">
            <!-- Submit Form -->
            <div class="solid-card">
                <h2 class="section-title">New Complaint</h2>
                <form id="complaintForm">
                    <div class="form-group">
                        <label for="cStudentName">Student Name</label>
                        <input type="text" id="cStudentName" class="form-control" required placeholder="Enter Name">
                    </div>
                    <div class="form-group">
                        <label for="cCategory">Category</label>
                        <select id="cCategory" class="form-control">
                            <option value="Lab">Lab</option>
                            <option value="Hostel">Hostel</option>
                            <option value="Cafe">Cafe</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cDesc">Description</label>
                        <textarea id="cDesc" class="form-control" rows="4" required
                            placeholder="Provide details..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="cPriority">Priority Level</label>
                        <select id="cPriority" class="form-control">
                            <option value="normal">Normal (Standard Queue)</option>
                            <option value="urgent">Urgent (Priority Queue)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Complaint</button>
                </form>
            </div>

            <!-- Tracking History / Array -->
            <div class="solid-card">
                <h2 class="section-title">My Complaints (Array)</h2>
                <div id="studentHistoryList">
                    <!-- Javascript populates this -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="dsa.js"></script>
    <script src="app.js"></script>
</body>

</html>
