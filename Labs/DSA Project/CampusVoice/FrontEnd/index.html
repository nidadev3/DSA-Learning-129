<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusVoice - Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">
    <header class="hero-header">
        <h1>CampusVoice</h1>
        <p class="hero-subtitle">The Modern Student Complaint Tracker</p>
    </header>

    <div class="container" style="display: flex; flex-direction: column; justify-content: center;">
        <div class="home-menu">
            <a href="student.html" class="solid-card home-card student-card">
                <div class="card-icon student-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 14l9-5-9-5-9 5 9 5z"></path>

                <h2>Student Portal</h2>
                <p>Submit your concerns and track their resolution status in real-time.</p>
            </a>

            <a href="admin.html" class="solid-card home-card admin-card">
                <div class="card-icon admin-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

                <p>Review queues, process urgent complaints, and manage the system.</p>
            </a>
        </div>
    </div>
