<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusVoice - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CampusVoice</h1>
        <p>Admin Dashboard - Process Queues</p>
    </header>

    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="btn btn-outline">&larr; Back to Menu</a>
            <button onclick="clearSystem()" class="btn btn-outline" style="border-color: #ef4444; color: #ef4444;">Reset
                System</button>
        </div>

        <div class="grid-2" style="margin-bottom: 2rem;">
            <!-- Priority Queue -->
            <div class="solid-card">
                <h2 class="section-title" style="color: #ef4444; border-bottom-color: #fecaca;">Priority Queue</h2>
                <div id="priorityQueueList">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Normal Queue -->
            <div class="solid-card">
                <h2 class="section-title" style="color: #2563eb; border-bottom-color: #bfdbfe;">Normal Queue</h2>
                <div id="normalQueueList">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <div class="grid-2">
            <!-- All Complaints Tracking Array (In-Progress) -->
            <div class="solid-card">
                <h2 class="section-title" style="color: #d97706; border-bottom-color: #fde68a;">In Progress</h2>
                <div id="inProgressList">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Resolved Stack -->
            <div class="solid-card">
                <h2 class="section-title" style="color: #059669; border-bottom-color: #a7f3d0;">Resolved History (Stack)
                </h2>
                <div id="resolvedStackList">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="dsa.js"></script>
    <script src="app.js"></script>
</body>

</html>
